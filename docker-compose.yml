services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: oidc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  oidc:
    build: .
    depends_on:
      - db
    environment:
      ISSUER: http://accounts.local:8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/oidc
      APP_SECRET: dev-secret-change
      SECURE_COOKIES: "false"
    ports:
      - "8000:8000"
    command: >
      bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
